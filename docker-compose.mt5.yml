# MT5 layer for the DEV stack — runs MetaTrader 5 under Wine with a
# browser-accessible KasmVNC desktop, using the maintained upstream image
# gmag11/metatrader5_vnc (https://github.com/gmag11/MetaTrader5-Docker, v2.3).
#
# Why this image instead of our own docker/mt5-terminal/Dockerfile: the
# MetaQuotes web installer (mt5setup.exe /auto) hangs under *headless* Wine.
# gmag11 runs it under a real X display (KasmVNC + openbox), so the install
# completes. The image self-installs, on first boot (~10-15 min):
#   * Wine-Mono, MetaTrader 5, Python 3.9 (Wine), MetaTrader5==5.0.36 + mt5linux
#   * a `mt5linux` RPyC bridge on port 8001 (mirrors the MetaTrader5 package API)
#   * the MT5 GUI, served over KasmVNC on port 3000
#
# Usage (layer ON TOP of base + dev — bring up ONLY the terminal for now):
#   docker compose -f docker-compose.base.yml -f docker-compose.dev.yml \
#                  -f docker-compose.mt5.yml up -d mt5-terminal
#
# Browser access (KasmVNC):  http://<vm-ip>:3000
#   login: MT5_VNC_USER / MT5_VNC_PASSWORD  (see .env)
# MT5 account login: in the MT5 window use File -> Login to Trade Account and
#   enter MT5_LOGIN / MT5_PASSWORD / MT5_SERVER. It persists in the
#   `mt5-config` volume, so you only do it once.
#
# NOTE — pipeline is NOT yet flipped to this bridge. The bot's
# LiveMT5Connector speaks our own RPyC bridge (port 18812); pointing it at
# gmag11's mt5linux server (port 8001) is a follow-up. Until that lands the
# trading pipeline stays on the replay connector (dev layer). See the
# disabled live-flip block at the bottom.

services:
  mt5-terminal:
    image: gmag11/metatrader5_vnc:latest
    container_name: xauusd-mt5-terminal
    environment:
      # KasmVNC web auth (linuxserver base).
      CUSTOM_USER: ${MT5_VNC_USER:-trader}
      PASSWORD: ${MT5_VNC_PASSWORD:?set MT5_VNC_PASSWORD in .env}
      TITLE: GoldManager MT5
      TZ: ${TZ:-Europe/Berlin}
    ports:
      # KasmVNC web desktop. Bound LAN-wide by default so you can reach it
      # from the Mac; it is password-protected. Set MT5_VNC_BIND_HOST=127.0.0.1
      # in .env to require an SSH tunnel instead (more conservative).
      - "${MT5_VNC_BIND_HOST:-0.0.0.0}:3000:3000"
      # mt5linux RPyC bridge — loopback-only on the host. The bot will reach it
      # over the compose network as `mt5-terminal:8001` (no host publish needed);
      # the 127.0.0.1 publish is just for debugging from the VM itself.
      - "127.0.0.1:8001:8001"
    volumes:
      - mt5-config:/config
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    healthcheck:
      # Ready once the mt5linux bridge is listening on 8001 (after the long
      # first-boot install). start_period is generous to cover that install.
      test: ["CMD-SHELL", "ss -tuln 2>/dev/null | grep -q ':8001 ' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1200s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

# --- STAGE 2 (disabled): flip the pipeline onto the live MT5 bridge ---------
